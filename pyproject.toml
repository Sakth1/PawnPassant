[project]
name = "pawnpassant"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Flet developer", email = "you@example.com" }
]
dependencies = [
    "flet==0.84.0",
    "chess==1.11.2",
    "annotated-doc==0.0.4",
    "annotated-types==0.7.0",
    "anyio==4.13.0",
    "arrow==1.4.0",
    "binaryornot==0.4.4",
    "certifi==2026.2.25",
    "chardet==5.2.0",
    "charset-normalizer==3.4.7",
    "click==8.3.2",
    "colorama==0.4.6",
    "cookiecutter==2.7.1",
    "fastapi==0.135.3",
    "flet-cli==0.84.0",
    "flet-desktop==0.84.0",
    "flet-web==0.84.0",
    "h11==0.16.0",
    "httpcore==1.0.9",
    "httptools==0.7.1",
    "httpx==0.28.1",
    "idna==3.11",
    "jinja2==3.1.6",
    "markdown-it-py==4.0.0",
    "markupsafe==3.0.3",
    "mdurl==0.1.2",
    "msgpack==1.1.2",
    "oauthlib==3.3.1",
    "packaging==26.0",
    "pydantic==2.12.5",
    "pydantic-core==2.41.5",
    "pygments==2.20.0",
    "python-dateutil==2.9.0.post0",
    "python-dotenv==1.2.2",
    "python-slugify==8.0.4",
    "pyyaml==6.0.3",
    "qrcode==8.2",
    "repath==0.9.0",
    "requests==2.33.1",
    "rich==14.3.3",
    "six==1.17.0",
    "starlette==1.0.0",
    "text-unidecode==1.3",
    "typing-extensions==4.15.0",
    "typing-inspection==0.4.2",
    "tzdata==2026.1",
    "urllib3==2.6.3",
    "uvicorn==0.44.0",
    "watchdog==6.0.0",
    "watchfiles==1.1.1",
    "websockets==16.0",
]

[dependency-groups]
dev = [
    "flet-cli>=0.81.0",
    "flet-desktop>=0.81.0",
    "flet-web>=0.81.0",
]

[tool.flet]
org = "com.mycompany"
product = "Pawn Passant"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
source_packages = ["chess"]

[tool.flet.app]
path = "src"

[tool.pawnpassant.release]
binary_name = "Pawn-Passant"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "N"]  # errors, pyflakes, naming

# Optional but useful
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
